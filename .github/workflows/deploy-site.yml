name: deploy-site

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: rerust-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Cache scan database
        uses: actions/cache@v4
        with:
          path: rerust.db
          key: rerust-db-${{ github.run_id }}
          restore-keys: |
            rerust-db-

      - name: Build
        run: cargo build --release

      - name: Reclassify and build static site
        run: |
          ./target/release/rerust reclassify --db rerust.db
          ./target/release/rerust build-site --db rerust.db --out docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
